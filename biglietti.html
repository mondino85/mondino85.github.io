<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Biglietti da visita personalizzati | Contatto rapido WhatsApp</title>
  <meta
    name="description"
    content="Richiedi subito una bozza gratuita per biglietti da visita personalizzati e parla direttamente con il grafico su WhatsApp."
  />
  <style>
    :root {
      --bg: #f4f7f4;
      --surface: rgba(255, 255, 255, 0.94);
      --text: #0f1720;
      --muted: #5c6b62;
      --whatsapp: #25d366;
      --whatsapp-dark: #1ea952;
      --shadow: 0 24px 60px rgba(15, 23, 32, 0.12);
      --radius: 32px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Inter, Arial, Helvetica, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(37, 211, 102, 0.15), transparent 35%),
        linear-gradient(180deg, #f8fbf8 0%, #edf5ee 100%);
    }

    main {
      width: min(100%, 760px);
    }

    .card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: clamp(32px, 6vw, 64px);
      text-align: center;
      border: 1px solid rgba(37, 211, 102, 0.12);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 18px;
      border-radius: 999px;
      background: rgba(37, 211, 102, 0.12);
      color: var(--whatsapp-dark);
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 24px;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.2rem, 6vw, 4.5rem);
      line-height: 0.95;
      letter-spacing: -0.05em;
    }

    p {
      margin: 22px auto 0;
      max-width: 34ch;
      font-size: clamp(1.05rem, 2vw, 1.25rem);
      line-height: 1.6;
      color: var(--muted);
    }

    .cta {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-top: 34px;
      width: min(100%, 420px);
      min-height: 84px;
      padding: 20px 28px;
      border-radius: 24px;
      background: linear-gradient(135deg, var(--whatsapp), var(--whatsapp-dark));
      color: #ffffff;
      text-decoration: none;
      font-size: clamp(1.1rem, 2.6vw, 1.45rem);
      font-weight: 800;
      line-height: 1.2;
      box-shadow: 0 18px 40px rgba(37, 211, 102, 0.28);
      transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
    }

    .cta:hover,
    .cta:focus-visible {
      transform: translateY(-2px) scale(1.01);
      box-shadow: 0 22px 46px rgba(37, 211, 102, 0.34);
      filter: saturate(1.03);
    }

    .cta:focus-visible {
      outline: 4px solid rgba(37, 211, 102, 0.24);
      outline-offset: 4px;
    }

    .note {
      margin-top: 18px;
      font-size: 0.95rem;
      color: #718178;
    }

    @media (max-width: 640px) {
      body {
        padding: 16px;
      }

      .card {
        border-radius: 24px;
      }

      .cta {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="card">
      <div class="eyebrow">Bozza gratuita</div>
      <h1>Contatta subito il grafico per i tuoi biglietti da visita.</h1>
      <p>
        Una pagina semplice e diretta: nessun generatore, nessuna distrazione.
        Premi il pulsante qui sotto e apri subito la conversazione su WhatsApp.
      </p>
      <a
        class="cta"
        href="https://wa.me/393516020208?text=Ciao%2C%20vorrei%20una%20bozza%20gratuita%20per%20biglietti%20da%20visita"
        target="_blank"
        rel="noreferrer"
      >
        CREA ADESSO E PARLA COL GRAFICO
      </a>
      <div class="note">Risposta rapida direttamente su WhatsApp.</div>
    </section>
  </main>
</body>
</html>
